<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hatti 3D-Print</title>

<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#ff416c,#ff4b2b);}
header{background:#111;color:white;text-align:center;padding:20px;}
header img{width:100px;}
.products{display:flex;justify-content:center;gap:20px;padding:20px;flex-wrap:wrap;}
.card{background:white;width:300px;padding:20px;border-radius:15px;text-align:center;box-shadow:0 8px 20px rgba(0,0,0,0.3);}
.card img{width:100%;border-radius:10px;cursor:pointer;}
select{width:100%;padding:8px;margin-top:8px;}
button{background:#ff416c;color:white;border:none;padding:12px;border-radius:25px;margin-top:10px;width:100%;cursor:pointer;}
button:hover{background:#ff1f4b;}
.offer{background:green;color:white;padding:5px;border-radius:8px;font-size:14px;margin-top:5px;display:inline-block;}
.cart{background:white;margin:30px auto;padding:20px;width:95%;max-width:600px;border-radius:15px;}
input{width:100%;padding:10px;margin:6px 0;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;}
.modal-content{background:white;padding:20px;border-radius:15px;width:90%;max-width:500px;text-align:center;position:relative;}
.modal-content img{width:100%;border-radius:10px;}
.close{position:absolute;top:10px;right:15px;font-size:22px;cursor:pointer;}
</style>
</head>

<body>

<header>
<img src="logo.png">
<h1>Hatti 3D-Print</h1>
<p><strong>Alle produkter printes på bestilling</strong></p>
</header>

<div class="products">

<!-- POKEMON -->
<div class="card">
<img id="pokemonImage" src="pokemon.jpg" onclick="openGallery('pokemon')">
<h2>Pokemon Kortboks</h2>
<p><strong>399 kr</strong></p>

<select id="pokemonVariant" onchange="changePokemonImage()">
<option value="Rød">Rød topplokk</option>
<option value="Blå">Blå topplokk</option>
</select>

<button onclick="addPokemon()">Legg i handlekurv</button>
</div>

<!-- IS -->
<div class="card">
<img id="isImage" src="is1.jpg" onclick="openGallery('is')">
<h2>Isbeger Holder</h2>

<p>
<span style="text-decoration:line-through;color:gray;">799 kr</span>
<strong style="color:red;font-size:20px;"> 699 kr</strong>
</p>

<div class="offer">🔥 Tilbud!</div>

<select id="isVariant" onchange="changeIsImage()">
<option value="Highland Cow">Highland Cow</option>
<option value="Panda">Panda</option>
</select>

<button onclick="addIs()">Legg i handlekurv</button>
</div>

</div>

<!-- GALLERI -->
<div class="modal" id="galleryModal">
<div class="modal-content">
<span class="close" onclick="closeGallery()">✖</span>
<img id="galleryImage">
<br><br>
<button onclick="prevImage()">Forrige</button>
<button onclick="nextImage()">Neste</button>
</div>
</div>

<!-- HANDLEKURV -->
<div class="cart">
<h2>Handlekurv</h2>
<div id="cartItems"></div>
<p><strong>Total: <span id="total">0</span> kr</strong></p>

<h3>Kundeinformasjon</h3>
<input type="text" id="name" placeholder="Navn">
<input type="text" id="address" placeholder="Adresse">
<input type="text" id="postcode" placeholder="Postnummer">
<input type="text" id="city" placeholder="Poststed">
<input type="text" id="phone" placeholder="Telefonnummer">

<p style="background:#fff3cd;padding:10px;border-radius:8px;">
Betal med Vipps til <b>48093344</b> og skriv <b>ordrenummeret</b> i kommentarfeltet.
</p>

<button onclick="checkout()">Fullfør bestilling</button>
</div>

<script>
let cart=[];
let total=0;

function addPokemon(){
let variant=document.getElementById("pokemonVariant").value;
addToCart("Pokemon Kortboks - "+variant,399);
}

function addIs(){
let variant=document.getElementById("isVariant").value;
addToCart("Isbeger Holder - "+variant,699);
}

function addToCart(name,price){
cart.push({name,price});
total+=price;
renderCart();
}

function renderCart(){
let div=document.getElementById("cartItems");
div.innerHTML="";
cart.forEach((item,index)=>{
div.innerHTML+=item.name+" - "+item.price+" kr <button onclick='removeItem("+index+")'>X</button><br>";
});
document.getElementById("total").innerText=total;
}

function removeItem(index){
total-=cart[index].price;
cart.splice(index,1);
renderCart();
}

/* Variant bildebytte */

function changePokemonImage(){
let variant=document.getElementById("pokemonVariant").value;
document.getElementById("pokemonImage").src = 
variant==="Rød" ? "pokemon.jpg" : "pokemon2.jpg";
}

function changeIsImage(){
let variant=document.getElementById("isVariant").value;
document.getElementById("isImage").src =
variant==="Highland Cow" ? "is1.jpg" : "is4.png";
}

/* Galleri */

let currentImages=[];
let currentIndex=0;

function openGallery(type){
if(type==="pokemon"){
let variant=document.getElementById("pokemonVariant").value;
currentImages = variant==="Rød" ? ["pokemon.jpg"] : ["pokemon2.jpg"];
}
if(type==="is"){
let variant=document.getElementById("isVariant").value;
currentImages = variant==="Highland Cow" ?
["is1.jpg","is2.jpg","is3.jpg"] :
["is4.png","is5.png"];
}
currentIndex=0;
document.getElementById("galleryImage").src=currentImages[0];
document.getElementById("galleryModal").style.display="flex";
}

function closeGallery(){document.getElementById("galleryModal").style.display="none";}
function nextImage(){currentIndex=(currentIndex+1)%currentImages.length;document.getElementById("galleryImage").src=currentImages[currentIndex];}
function prevImage(){currentIndex=(currentIndex-1+currentImages.length)%currentImages.length;document.getElementById("galleryImage").src=currentImages[currentIndex];}

/* Checkout */

function checkout(){
if(cart.length===0){alert("Handlekurven er tom!");return;}

let orderNumber="H3D-"+Math.floor(Math.random()*1000000);

alert("Ordrenummer: "+orderNumber+"\n\nSkriv dette i Vipps-kommentarfeltet.");

window.location.href=
"mailto:hj.1994@hotmail.com?subject=Ny bestilling "+orderNumber+
"&body=Ordrenummer: "+orderNumber+"%0D%0AProdukter:%0D%0A"+
cart.map(i=>i.name+" - "+i.price+" kr").join("%0D%0A")+
"%0D%0ATotal: "+total+" kr%0D%0AVipps: 48093344";
}
</script>

</body>
</html>
